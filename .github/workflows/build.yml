name: Build and Release

on:
    push:
        tags: ['v*']
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Windows x64（portable 可执行文件）
                    - os: windows-latest
                      build_script: npm run build:win
                      artifact_name: windows-x64
                      artifact_path: dist/*.exe

                    # macOS（同时构建 Apple Silicon arm64 与 Intel x64）
                    - os: macos-latest
                      build_script: npm run build:mac
                      artifact_name: macos-dmg
                      artifact_path: dist/*.dmg

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  # Node 22 默认支持 require() 加载 ESM 模块，
                  # electron-builder 26 依赖的 @noble/hashes 2.x 为纯 ESM，
                  # 使用 Node 18 会触发 ERR_REQUIRE_ESM 构建失败
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Verify build assets
              shell: bash
              run: |
                  echo "检查构建资源..."
                  ls -la build/ || echo "build 目录不存在"

            - name: Build application
              run: ${{ matrix.build_script }}

            - name: List dist directory
              shell: bash
              run: |
                  echo "构建完成，dist 目录内容："
                  ls -la dist/ || echo "dist 目录不存在"

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: ${{ matrix.artifact_path }}
                  retention-days: 30

    release:
        needs: build
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/v')
        permissions:
            contents: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Display structure of downloaded files
              run: ls -R artifacts

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: artifacts/**/*
                  draft: false
                  prerelease: false
                  generate_release_notes: true
                  token: ${{ secrets.GITHUB_TOKEN }}
